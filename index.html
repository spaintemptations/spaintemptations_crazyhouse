<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#0f0f0f;
      color:white;
    }

    header {
      text-align:center;
      padding:60px 20px;
      background:linear-gradient(135deg,#1f1f1f,#000);
    }

    h1 {
      font-size:3rem;
      margin-bottom:10px;
    }

    p {
      opacity:0.8;
    }

    section {
      padding:40px 20px;
      max-width:800px;
      margin:auto;
    }

    input, textarea {
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:8px;
      background:#1a1a1a;
      color:white;
    }

    button {
      padding:15px;
      width:100%;
      border:none;
      background:#00c853;
      color:white;
      font-size:16px;
      border-radius:10px;
      cursor:pointer;
    }

    .paypal-box {
      margin-top:30px;
      display:flex;
      justify-content:center;
    }
  </style>

  <!-- PayPal Script -->
  <script src="https://www.paypal.com/sdk/js?client-id=BAAb4NCjx-rPAim2NH5homI-DLO5kI8DpqPNGAzC3JdxPU9_Z2wROqdZCEzm8iww9IqwRcnOonqpQ0fFtk&components=hosted-buttons&disable-funding=venmo&currency=EUR"></script>

</head>

<body>

<header>
  <h1>CASTING ABIERTO</h1>
  <p>Participa en nuestro nuevo proyecto. Plazas limitadas.</p>

  <!-- BOTÓN PAYPAL -->
  <div class="paypal-box">
    <div id="paypal-container-E2Q6A7CZGUXWL"></div>
  </div>
</header>

<section>
  <h2>Formulario de inscripción</h2>

  <form action="https://formsubmit.co/megacalvillo@gmail.com" method="POST">
    <input type="text" name="Nombre" placeholder="Nombre completo" required>
    <input type="number" name="Edad" placeholder="Edad" required>
    <input type="text" name="Instagram" placeholder="Instagram">
    <textarea name="Descripcion" placeholder="Cuéntanos sobre ti"></textarea>
    <input type="url" name="Video" placeholder="Link vídeo (Drive, YouTube, etc)">

    <input type="hidden" name="_captcha" value="false">

    <button type="submit">Enviar inscripción</button>
  </form>
</section>

<!-- SCRIPT PAYPAL -->
<script>
  paypal.HostedButtons({
    hostedButtonId: "E2Q6A7CZGUXWL",
  }).render("#paypal-container-E2Q6A7CZGUXWL");
</script>

</body>
</html>
